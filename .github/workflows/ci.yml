name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  go:
    runs-on: ubuntu-latest
    env:
      GO111MODULE: "off"
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.22"

      - name: Check formatting
        run: |
          unformatted="$(gofmt -l cpu_memory_stress.go cpu_memory_stress_test.go)"
          if [ -n "$unformatted" ]; then
            echo "These files need gofmt:"
            echo "$unformatted"
            exit 1
          fi

      - name: Run tests
        run: go test

      - name: Build binary
        run: go build -o cpu_memory_stress cpu_memory_stress.go
